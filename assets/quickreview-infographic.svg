<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" width="400" height="720">
  <defs>
    <!-- shadow-lg equivalent -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.1"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <!-- shadow-md for badge -->
    <filter id="badgeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <!-- Solid gold color for FREE text - easy to read -->
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DAA520"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6ee7a8"/>
      <stop offset="50%" style="stop-color:#a7f3d0"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8f5e9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="720" fill="url(#bgGradient)"/>
  <rect x="15" y="18" width="370" height="110" rx="16" fill="url(#headerGradient)" stroke="#059669" stroke-width="2"/>
  
  <!-- Title Section - Bold and eye-catching -->
  <text x="200" y="55" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#059669">Business Owners:</text>
  
  <!-- Second line: "4 Steps to Rank on" + Google logo + "/" + Yelp logo -->
  <text x="68" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#1a1a1a">4 Steps to Rank on</text>
  
  <!-- Google logo inline (bigger) -->
  <g transform="translate(252, 72) scale(0.6)">
    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
  </g>
  
  <!-- Slash between logos -->
  <text x="292" y="95" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#666">/</text>
  
  <!-- Yelp logo inline (bigger) -->
  <g transform="translate(304, 70) scale(0.065)">
    <path style="fill:#DC0000;" d="M182.47,306.937l-60.235,73.351c-8.475,10.32-4.426,25.905,8,30.796l58.889,23.178c12.704,5,26.514-4.141,26.875-17.789l2.539-96.083C219.05,301.021,194.766,291.964,182.47,306.937z"/>
    <path style="fill:#DC0000;" d="M172.459,234.019l-89.331-32.073c-12.569-4.513-25.886,4.539-26.315,17.887l-2.033,63.253c-0.439,13.646,12.813,23.58,25.788,19.331l91.345-29.907C190.327,266.482,190.694,240.566,172.459,234.019z"/>
    <path style="fill:#DC0000;" d="M274.839,244.311l91.502-25.22c12.874-3.548,18.549-18.617,11.214-29.777l-34.762-52.883c-7.499-11.408-24.054-11.899-32.215-0.954l-57.458,77.052C241.537,228.061,256.161,249.46,274.839,244.311z"/>
    <path style="fill:#DC0000;" d="M208.574,24.431c0.728-15.826-14.185-27.765-29.469-23.591l-72.428,19.78c-15.625,4.267-22.261,22.761-12.914,35.989l83.116,143.998c0.675,1.169,1.419,2.302,2.294,3.331c12.309,14.465,35.417,9.105,41.113-7.828c1.023-3.042,1.311-6.284,1.059-9.484L208.574,24.431z"/>
    <path style="fill:#DC0000;" d="M366.966,310.135l-91.883-28.213c-18.521-5.687-33.759,15.279-22.631,31.14l54.511,77.7c7.669,10.932,23.77,11.211,31.813,0.551l38.12-50.516C385.12,329.899,380.017,314.143,366.966,310.135z"/>
  </g>
  
  <!-- (It's Free! 🤫) text -->
  <text x="200" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600">
    <tspan fill="#1a1a1a">(It's </tspan><tspan fill="#DAA520" font-weight="900">FREE</tspan><tspan fill="#1a1a1a">! 🤫)</tspan>
  </text>
  
  <!-- Step 1 -->
  <g transform="translate(60, 140)">
    <!-- Card with border -->
    <rect x="0" y="12" width="280" height="115" rx="16" fill="white" stroke="#d1fae5" stroke-width="1" filter="url(#cardShadow)"/>
    
    <!-- Number badge - half in, half out of box -->
    <circle cx="24" cy="12" r="16" fill="#059669" filter="url(#badgeShadow)"/>
    <text x="24" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">1</text>
    
    <!-- Content area with padding -->
    <g transform="translate(20, 32)">
      <!-- Icon container - w-12 h-12 bg-emerald-100 rounded-xl -->
      <rect x="0" y="0" width="44" height="44" rx="12" fill="#d1fae5"/>
      <!-- QR Code icon -->
      <g transform="translate(10, 10)">
        <rect x="0" y="0" width="7" height="7" fill="#059669"/>
        <rect x="9" y="0" width="7" height="7" fill="#059669"/>
        <rect x="0" y="9" width="7" height="7" fill="#059669"/>
        <rect x="12" y="9" width="4" height="4" fill="#059669"/>
        <rect x="9" y="14" width="4" height="4" fill="#059669"/>
        <rect x="0" y="18" width="4" height="4" fill="#059669"/>
        <rect x="18" y="0" width="4" height="4" fill="#059669"/>
        <rect x="18" y="18" width="4" height="4" fill="#059669"/>
      </g>
      
      <!-- Text - positioned next to icon -->
      <text x="54" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Display QR Code</text>
      <text x="54" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">Put up the QR code QuickReviewAI</text>
      <text x="54" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">generates at your register, table,</text>
      <text x="54" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">or door</text>
    </g>
  </g>
  
  <!-- Step 2 -->
  <g transform="translate(60, 280)">
    <!-- Card with border -->
    <rect x="0" y="12" width="280" height="105" rx="16" fill="white" stroke="#d1fae5" stroke-width="1" filter="url(#cardShadow)"/>
    
    <!-- Number badge - half in, half out of box -->
    <circle cx="24" cy="12" r="16" fill="#059669" filter="url(#badgeShadow)"/>
    <text x="24" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2</text>
    
    <!-- Content area -->
    <g transform="translate(20, 32)">
      <!-- Icon container -->
      <rect x="0" y="0" width="44" height="44" rx="12" fill="#d1fae5"/>
      <!-- Smartphone icon -->
      <g transform="translate(12, 6)">
        <rect x="0" y="0" width="18" height="30" rx="3" fill="none" stroke="#059669" stroke-width="2"/>
        <circle cx="9" cy="25" r="2" fill="#059669"/>
        <rect x="6" y="3" width="6" height="2" rx="1" fill="#059669"/>
      </g>
      
      <!-- Text -->
      <text x="54" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Customer Scans</text>
      <text x="54" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">Happy customers scan the code</text>
      <text x="54" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">with their phone camera</text>
    </g>
  </g>
  
  <!-- Step 3 -->
  <g transform="translate(60, 410)">
    <!-- Card with border -->
    <rect x="0" y="12" width="280" height="105" rx="16" fill="white" stroke="#d1fae5" stroke-width="1" filter="url(#cardShadow)"/>
    
    <!-- Number badge - half in, half out of box -->
    <circle cx="24" cy="12" r="16" fill="#059669" filter="url(#badgeShadow)"/>
    <text x="24" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">3</text>
    
    <!-- Content area -->
    <g transform="translate(20, 32)">
      <!-- Icon container -->
      <rect x="0" y="0" width="44" height="44" rx="12" fill="#d1fae5"/>
      <!-- Sparkles icon -->
      <g transform="translate(6, 6)">
        <path d="M16 4 L18 11 L25 13 L18 15 L16 22 L14 15 L7 13 L14 11 Z" fill="#059669"/>
        <path d="M25 4 L26 7 L29 8 L26 9 L25 12 L24 9 L21 8 L24 7 Z" fill="#059669"/>
        <path d="M8 18 L9 20 L11 21 L9 22 L8 24 L7 22 L5 21 L7 20 Z" fill="#059669"/>
      </g>
      
      <!-- Text -->
      <text x="54" y="16" font-family="Arial Black, system-ui, sans-serif" font-size="15" font-weight="900" fill="#111827">AI Creates The Review</text>
      <text x="54" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">QuickReviewAI generates a</text>
      <text x="54" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">keyword-rich review instantly</text>
    </g>
  </g>
  
  <!-- Step 4 -->
  <g transform="translate(60, 540)">
    <!-- Card with border -->
    <rect x="0" y="12" width="280" height="115" rx="16" fill="white" stroke="#d1fae5" stroke-width="1" filter="url(#cardShadow)"/>
    
    <!-- Number badge - half in, half out of box -->
    <circle cx="24" cy="12" r="16" fill="#059669" filter="url(#badgeShadow)"/>
    <text x="24" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">4</text>
    
    <!-- Content area -->
    <g transform="translate(20, 32)">
      <!-- Icon container -->
      <rect x="0" y="0" width="44" height="44" rx="12" fill="#d1fae5"/>
      <!-- Upload/TrendingUp icon -->
      <g transform="translate(10, 8)">
        <path d="M12 4 L12 18" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M6 10 L12 4 L18 10" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M4 24 L20 24" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      
      <!-- Text -->
      <text x="54" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#111827">Copy, Paste, Done!</text>
      <text x="54" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">Customer copies the review, gets</text>
      <text x="54" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">redirected to Google or Yelp,</text>
      <text x="54" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4b5563">and pastes. That's it!</text>
    </g>
  </g>
</svg>
